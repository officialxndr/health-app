<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Buttons &mdash; press-driven (active:scale-95), pill-radius</div>
  <div class="row-wrap" style="align-items:center">
    <button class="fs-btn">Quick Start</button>
    <button class="fs-btn fs-btn--success">Finish</button>
    <button class="fs-btn" style="background:#1e1e1e">Cancel</button>
    <button class="fs-btn fs-btn--ghost">+ New</button>
    <button class="fs-btn" disabled>Starting&hellip;</button>
  </div>
  <div class="row-wrap" style="align-items:center;margin-top:4px">
    <button style="background:#6366f1;color:#fff;border:none;font-weight:600;font-size:14px;padding:12px;border-radius:16px;width:280px">Full-width primary (rounded-2xl)</button>
  </div>
  <div class="spec">Primary indigo &middot; success green for confirm &middot; ghost text for inline actions &middot; danger text for destructive</div>
</div>
</body></html>
