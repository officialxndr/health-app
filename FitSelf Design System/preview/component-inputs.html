<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Inputs, chips &amp; segmented toggle</div>
  <input class="fs-field" style="width:100%" placeholder="Email" value="" />
  <div class="row-wrap" style="align-items:center">
    <span class="fs-chip">Chest</span>
    <span class="fs-chip">Dumbbell</span>
    <span class="fs-chip">Strength</span>
    <div style="display:inline-flex;background:#1e1e1e;border-radius:8px;padding:2px;font-size:12px">
      <span style="padding:4px 12px;border-radius:6px;background:#6366f1;color:#fff">Servings</span>
      <span style="padding:4px 12px;border-radius:6px;color:#6b7280">Grams</span>
    </div>
  </div>
  <div class="spec">Fields: surface bg, hairline border, focus &rarr; indigo border. Segmented toggles fill the active option with solid indigo.</div>
</div>
</body></html>
