<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Macro palette &mdash; consistent across rings &amp; bars</div>
  <div class="row" style="align-items:stretch">
    <div class="swatch" style="background:#6366f1"><span class="name">Protein</span><span class="hex">#6366f1</span></div>
    <div class="swatch" style="background:#f59e0b"><span class="name">Carbs</span><span class="hex">#f59e0b</span></div>
    <div class="swatch" style="background:#ec4899"><span class="name">Fat</span><span class="hex">#ec4899</span></div>
  </div>
  <div class="col" style="gap:10px;margin-top:2px">
    <div><div class="row" style="justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#6b7280">Protein</span><span>112g / 150g</span></div><div style="height:6px;background:#1e1e1e;border-radius:99px;overflow:hidden"><div style="width:75%;height:100%;background:#6366f1;border-radius:99px"></div></div></div>
    <div><div class="row" style="justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#6b7280">Carbs</span><span>125g / 200g</span></div><div style="height:6px;background:#1e1e1e;border-radius:99px;overflow:hidden"><div style="width:62%;height:100%;background:#f59e0b;border-radius:99px"></div></div></div>
    <div><div class="row" style="justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#6b7280">Fat</span><span>48g / 65g</span></div><div style="height:6px;background:#1e1e1e;border-radius:99px;overflow:hidden"><div style="width:74%;height:100%;background:#ec4899;border-radius:99px"></div></div></div>
  </div>
</div>
</body></html>
