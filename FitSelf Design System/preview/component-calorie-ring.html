<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Calorie ring + macro bars &mdash; the signature daily summary</div>
  <div style="background:#141414;border-radius:16px;padding:16px">
    <div class="row" style="gap:24px">
      <div style="position:relative;width:130px;height:130px;flex-shrink:0">
        <svg width="130" height="130" viewBox="0 0 130 130" style="transform:rotate(-90deg)">
          <circle cx="65" cy="65" r="55" fill="none" stroke="#2a2a2a" stroke-width="10"/>
          <circle cx="65" cy="65" r="55" fill="none" stroke="#f59e0b" stroke-width="10" stroke-linecap="round"
            stroke-dasharray="276 69"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <span style="font-size:24px;font-weight:700">1,604</span>
          <span style="font-size:12px;color:#6b7280">/ 2,000 kcal</span>
        </div>
      </div>
      <div class="col" style="flex:1;gap:12px">
        <div><div class="row" style="justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#6b7280">Protein</span><span>112g / 150g</span></div><div style="height:6px;background:#1e1e1e;border-radius:99px;overflow:hidden"><div style="width:75%;height:100%;background:#6366f1"></div></div></div>
        <div><div class="row" style="justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#6b7280">Carbs</span><span>125g / 200g</span></div><div style="height:6px;background:#1e1e1e;border-radius:99px;overflow:hidden"><div style="width:62%;height:100%;background:#f59e0b"></div></div></div>
        <div><div class="row" style="justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:#6b7280">Fat</span><span>48g / 65g</span></div><div style="height:6px;background:#1e1e1e;border-radius:99px;overflow:hidden"><div style="width:74%;height:100%;background:#ec4899"></div></div></div>
      </div>
    </div>
  </div>
  <div class="spec">Ring color shifts green &rarr; amber &rarr; red as intake nears goal (here amber at ~80%). Track #2a2a2a, rounded cap.</div>
</div>
</body></html>
