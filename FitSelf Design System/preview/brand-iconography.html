<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style> .ico{display:flex;flex-direction:column;align-items:center;gap:5px;width:64px} .ico svg{width:22px;height:22px;color:#f9f9f9} .ico span{font-size:9px;color:#6b7280} </style></head>
<body>
<div class="card-grid">
  <div class="label">Iconography &mdash; lucide-react, used wholesale. No emoji.</div>
  <div class="row-wrap" style="gap:14px 8px">
    <div class="ico"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></div>
    <div class="ico"><i data-lucide="utensils-crossed"></i><span>Food</span></div>
    <div class="ico"><i data-lucide="dumbbell"></i><span>Workout</span></div>
    <div class="ico"><i data-lucide="heart-pulse"></i><span>Health</span></div>
    <div class="ico"><i data-lucide="flame"></i><span>Streak</span></div>
    <div class="ico"><i data-lucide="trophy"></i><span>PR</span></div>
    <div class="ico"><i data-lucide="scale"></i><span>Weight</span></div>
    <div class="ico"><i data-lucide="ruler"></i><span>Measure</span></div>
    <div class="ico"><i data-lucide="timer"></i><span>Rest</span></div>
    <div class="ico"><i data-lucide="scan-line"></i><span>Scan</span></div>
    <div class="ico"><i data-lucide="target"></i><span>Goals</span></div>
    <div class="ico"><i data-lucide="trending-down"></i><span>Trend</span></div>
  </div>
  <div class="spec">Stroke-based, rounded, even weight. Default stroke 2; active/emphasis 2.4&ndash;2.5. CDN-matched &mdash; no substitution needed.</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
