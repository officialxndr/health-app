<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .nav { position:relative; background:#141414; border-top:1px solid #2a2a2a; border-radius:0 0 16px 16px; display:flex; }
  .nav .half { flex:1; display:flex; }
  .nav .item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 0 12px; }
  .nav .item span { font-size:11px; font-weight:500; }
  .nav .gap { width:64px; flex-shrink:0; }
  .fab { position:absolute; left:50%; top:-22px; transform:translateX(-50%); width:56px; height:56px; border-radius:99px; background:#6366f1; box-shadow:0 8px 20px rgba(99,102,241,0.30); display:flex; align-items:center; justify-content:center; border:4px solid #0a0a0a; }
  .nav svg { width:24px; height:24px; }
</style></head>
<body>
<div class="card-grid">
  <div class="label">Bottom nav &mdash; contextual tabs split around an elevated FAB</div>
  <div style="background:#0a0a0a;padding-top:8px;border-radius:16px">
    <div class="nav">
      <div class="half">
        <div class="item" style="color:#6366f1"><i data-lucide="utensils-crossed" style="stroke-width:2.4"></i><span>Food</span></div>
        <div class="item" style="color:#6b7280"><i data-lucide="dumbbell"></i><span>Workout</span></div>
      </div>
      <div class="gap"></div>
      <div class="half">
        <div class="item" style="color:#6b7280"><i data-lucide="heart-pulse"></i><span>Health</span></div>
        <div class="item" style="color:#6b7280"><i data-lucide="settings"></i><span>Settings</span></div>
      </div>
      <div class="fab"><i data-lucide="plus" style="color:#fff;width:28px;height:28px;stroke-width:2.5"></i></div>
    </div>
  </div>
  <div class="spec">Active tab = indigo + heavier stroke (2.4). Inactive = muted. The center FAB opens a section-specific quick-action sheet.</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
