<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Dark surface stack &mdash; the near-black luminance ladder</div>
  <div class="row" style="align-items:stretch">
    <div class="swatch" style="background:#0a0a0a"><span class="name">Background</span><span class="hex">#0a0a0a</span></div>
    <div class="swatch" style="background:#141414"><span class="name">Surface</span><span class="hex">#141414</span></div>
    <div class="swatch" style="background:#1e1e1e"><span class="name">Surface-high</span><span class="hex">#1e1e1e</span></div>
    <div class="swatch" style="background:#2a2a2a"><span class="name">Border</span><span class="hex">#2a2a2a</span></div>
  </div>
  <div class="row" style="align-items:stretch">
    <div class="swatch" style="background:#f9f9f9;color:#0a0a0a;border-color:#2a2a2a"><span class="name">Text</span><span class="hex">#f9f9f9</span></div>
    <div class="swatch" style="background:#6b7280"><span class="name">Muted</span><span class="hex">#6b7280</span></div>
  </div>
</div>
</body></html>
