<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Stat numerics &mdash; bold, tabular, the hero of every screen</div>
  <div class="row" style="justify-content:space-between;align-items:baseline">
    <span class="fs-display">182.4</span>
    <span class="spec">Display &middot; 30px / 700 &middot; -1% tracking</span>
  </div>
  <div class="row" style="justify-content:space-between;align-items:baseline">
    <span class="fs-stat">1,860</span>
    <span class="spec">Stat &middot; 24px / 700 &middot; tabular-nums</span>
  </div>
  <div class="row" style="gap:18px;align-items:baseline">
    <span class="fs-stat" style="color:#6366f1">51:07</span>
    <span class="spec">Timers &amp; large numbers run tabular so they don't jitter</span>
  </div>
</div>
</body></html>
