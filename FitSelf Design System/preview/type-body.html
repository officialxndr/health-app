<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="row" style="justify-content:space-between;align-items:baseline">
    <span class="fs-body">Goblet Squat (Kettlebell)</span>
    <span class="spec">Body &middot; 14px / 400</span>
  </div>
  <div class="row" style="justify-content:space-between;align-items:baseline">
    <span class="fs-body-medium">Quick Start</span>
    <span class="spec">Body medium &middot; 14px / 500</span>
  </div>
  <div class="row" style="justify-content:space-between;align-items:baseline">
    <span class="fs-caption">Last performed 3 days ago</span>
    <span class="spec">Caption &middot; 12px / 400 muted</span>
  </div>
  <div class="row" style="justify-content:space-between;align-items:baseline">
    <span class="fs-nav" style="color:#6366f1">Dashboard</span>
    <span class="spec">Nav label &middot; 11px / 500</span>
  </div>
  <div class="row" style="justify-content:space-between;align-items:baseline">
    <span class="fs-overline">Previous</span>
    <span class="spec">Overline &middot; 10px / 600 uppercase</span>
  </div>
</div>
</body></html>
