<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Semantic status &mdash; solid for moments, 10% wash for banners</div>
  <div class="row" style="align-items:stretch">
    <div class="swatch" style="background:#22c55e"><span class="name">Success</span><span class="hex">#22c55e</span></div>
    <div class="swatch" style="background:#f59e0b"><span class="name">Warning</span><span class="hex">#f59e0b</span></div>
    <div class="swatch" style="background:#ef4444"><span class="name">Danger</span><span class="hex">#ef4444</span></div>
  </div>
  <div class="row-wrap">
    <span class="fs-badge fs-badge--success">On Pace</span>
    <span class="fs-badge fs-badge--warning">Slightly Behind</span>
    <span class="fs-badge fs-badge--danger">Off Track</span>
    <span class="fs-badge fs-badge--primary">Session in progress</span>
  </div>
</div>
</body></html>
