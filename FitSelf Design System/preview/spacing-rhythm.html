<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Spacing rhythm &mdash; 4px base; the values actually in use</div>
  <div class="col" style="gap:8px">
    <div class="row" style="gap:14px"><div style="width:4px;height:18px;background:#6366f1"></div><span class="spec" style="width:64px">4 &middot; space-1</span><span class="fs-caption">hairline gaps, icon padding</span></div>
    <div class="row" style="gap:14px"><div style="width:8px;height:18px;background:#6366f1"></div><span class="spec" style="width:64px">8 &middot; space-2</span><span class="fs-caption">inline gaps, chip padding</span></div>
    <div class="row" style="gap:14px"><div style="width:12px;height:18px;background:#6366f1"></div><span class="spec" style="width:64px">12 &middot; space-3</span><span class="fs-caption">gap between stacked cards</span></div>
    <div class="row" style="gap:14px"><div style="width:16px;height:18px;background:#6366f1"></div><span class="spec" style="width:64px">16 &middot; space-4</span><span class="fs-caption">page padding (p-4)</span></div>
    <div class="row" style="gap:14px"><div style="width:24px;height:18px;background:#6366f1"></div><span class="spec" style="width:64px">24 &middot; space-6</span><span class="fs-caption">sheet padding, section gaps</span></div>
  </div>
</div>
</body></html>
