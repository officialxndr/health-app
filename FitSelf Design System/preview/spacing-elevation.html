<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-grid">
  <div class="label">Elevation &mdash; the UI is flat; only two shadows exist</div>
  <div class="row-wrap" style="gap:24px;align-items:center;padding:6px 0">
    <div class="col" style="align-items:center;gap:12px">
      <div style="width:56px;height:56px;border-radius:99px;background:#6366f1;box-shadow:0 8px 20px rgba(99,102,241,0.30);display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:300">+</div>
      <span class="spec">FAB &middot; colored shadow</span>
    </div>
    <div class="col" style="align-items:center;gap:12px">
      <div style="width:150px;height:56px;border-radius:16px;background:#141414;border:1px solid #2a2a2a;box-shadow:0 10px 25px rgba(0,0,0,0.45);display:flex;align-items:center;padding:0 16px;font-size:13px">Pop-over menu</div>
      <span class="spec">Menus / dropdowns</span>
    </div>
    <div class="col" style="align-items:center;gap:12px">
      <div style="width:150px;height:56px;border-radius:16px;background:#141414;display:flex;align-items:center;padding:0 16px;font-size:13px;color:#6b7280">Card &middot; no shadow</div>
      <span class="spec">Everything else is flat</span>
    </div>
  </div>
</div>
</body></html>
