<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  svg{width:16px;height:16px}
  .meal{background:#141414;border-radius:16px;overflow:hidden}
  .meal-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 12px 16px}
  .meal-hd .name{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600}
  .meal-hd .name i{color:#6b7280}
  .meal-hd .right{display:flex;align-items:center;gap:14px}
  .add-btn{width:40px;height:40px;border-radius:99px;border:none;cursor:pointer;
           background:rgba(99,102,241,0.18);color:#6366f1;display:flex;align-items:center;justify-content:center}
  .add-btn i{width:22px;height:22px;stroke-width:2.4}
  .row-item{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid #2a2a2a}
  .row-item .nm{font-size:14px;font-weight:500}
  .row-item .sv{font-size:12px;color:#6b7280;margin-top:1px}
  .row-item .cal{font-size:14px;font-variant-numeric:tabular-nums;color:#f9f9f9}
</style></head>
<body>
<div class="card-grid">
  <div class="label">Meal section &mdash; borderless card, hairline dividers</div>
  <div class="meal">
    <div class="meal-hd">
      <div class="name"><i data-lucide="coffee"></i><span>Breakfast</span></div>
      <div class="right">
        <span class="fs-caption" style="font-size:13px">430 kcal</span>
        <button class="add-btn" aria-label="Add to Breakfast"><i data-lucide="plus"></i></button>
      </div>
    </div>
    <div class="row-item">
      <div><div class="nm">Oatmeal with berries</div><div class="sv">120 g</div></div>
      <span class="cal">210 kcal</span>
    </div>
    <div class="row-item">
      <div><div class="nm">Greek yogurt</div><div class="sv">1 &times; 170g</div></div>
      <span class="cal">220 kcal</span>
    </div>
  </div>
  <div class="spec">Each meal shows its calorie total and a tap-to-add <strong style="color:#9ca3af">+</strong> button in the header. Rows swipe left to reveal a red Delete zone; the serving label is tap-to-edit inline.</div>
</div>
<script>lucide.createIcons();</script>
</body></html>
